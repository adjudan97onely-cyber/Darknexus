<!DOCTYPE html>
<html>
<head>
    <title>Test srcDoc</title>
</head>
<body>
    <h1>Test srcDoc Attribute</h1>
    
    <h2>Test 1: srcDoc avec HTML simple en string</h2>
    <iframe 
        id="test1"
        title="Test 1"
        sandbox="allow-scripts allow-same-origin allow-forms"
        style="width: 100%; height: 300px; border: 1px solid red;"
    ></iframe>
    
    <h2>Test 2: srcDoc avec HTML complexe</h2>
    <iframe 
        id="test2"
        title="Test 2"
        sandbox="allow-scripts allow-same-origin allow-forms"
        style="width: 100%; height: 300px; border: 1px solid blue;"
    ></iframe>

    <script>
        // Test 1: HTML minimal
        const simpleHtml = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #ff0000; color: white; font-size: 24px; }
    </style>
</head>
<body>
    <h1>Test 1 - COUCOU!</h1>
    <p>Cet texte doit être ROUGE avec fond ROUGE</p>
</body>
</html>`;

        document.getElementById('test1').srcdoc = simpleHtml;

        // Test 2: HTML compliqué (comme le backend)
        const complexHtml = `<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Complexe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        
        .content {
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 0.5rem;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Test Complexe</h1>
            <p>Cet texte doit être blanc avec gradient pourpre en background</p>
        </div>
        <div class="content">
            <h2>Contenu Complexe</h2>
            <p>Si tu vois ceci avec le gradient violet, srcDoc fonctionne!</p>
        </div>
    </div>
</body>
</html>`;

        document.getElementById('test2').srcdoc = complexHtml;

        console.log('Test srcDoc lancé');
        console.log('Test1 srcdoc longueur:', document.getElementById('test1').srcdoc.length);
        console.log('Test2 srcdoc longueur:', document.getElementById('test2').srcdoc.length);
    </script>
</body>
</html>
