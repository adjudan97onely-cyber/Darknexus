services:
  - type: web
    name: analytics-lottery-backend
    env: python
    region: frankfurt
    plan: free
    
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8080
    
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        scope: build,runtime
        value: https://analytics-lottery.vercel.app
